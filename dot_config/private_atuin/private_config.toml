dialect = "uk"
timezone = "local"
auto_sync = true
update_check = true
sync_address = "https://api.atuin.sh"
sync_frequency = "10m"
search_mode = "fuzzy"
filter_mode = "host"
workspaces = false
style = "auto"
inline_height = 0
invert = false
show_preview = true
word_jump_mode = "emacs"
word_chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
ctrl_n_shortcuts = false
history_format = "{time}\t{command}\t{duration}"

history_filter = [
   "^secret-cmd",
   "^innocuous-cmd .*--secret=.+",
]

show_help = true
show_tabs = true
enter_accept = true
keymap_mode = "auto"

network_connect_timeout = 5
network_timeout = 5
local_timeout = 5

[stats]
common_prefix = ["sudo"]
ignored_commands = [
   "cd",
   "ls",
   "vi"
]

[keys]
scroll_exits = false

[sync]
records = true

[preview]
strategy = "auto"

[daemon]
enabled = false
sync_frequency = 300

[dotfiles]
enabled = true
